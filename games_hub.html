<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Haleon Games Hub</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      /* Fixed Black & White Theme */
      --bg: #000000; 
      --surface: #0a0a0a; /* Very dark gray for cards to slightly pop against pure black */
      --border: #333333;
      --text: #ffffff;
      --muted: #aaaaaa;
      --green: #10B981;
      --icon-bg: rgba(255, 255, 255, 0.08);
      --icon-border: #555555;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      padding-bottom: 60px; /* Space for the PM code */
    }

    .header {
      text-align: center;
      padding: 40px 20px 20px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
      margin-bottom: 40px;
    }

    .app-logo {
      max-width: 180px;
      margin-bottom: 15px;
    }

    .page-title {
      font-size: 2.5rem;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .page-sub {
      color: var(--muted);
      font-size: 1.1rem;
      font-weight: 400;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }

    /* Game Card Styles */
    .game-card {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 20px;
      padding: 24px 15px;
      text-align: center;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: all 0.2s ease-in-out;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .game-card:hover {
      border-color: var(--green);
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(16, 185, 129, 0.15);
    }

    .game-icon-wrap {
      width: 60px;
      height: 60px;
      background: var(--icon-bg);
      border: 2px solid var(--icon-border);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
      transition: all 0.2s ease-in-out;
    }

    .game-card:hover .game-icon-wrap {
      background: var(--green);
      border-color: var(--green);
    }

    .game-icon {
      width: 32px;
      height: 32px;
      object-fit: contain;
      transition: filter 0.2s;
    }

    /* Force the icon to be white for high contrast */
    .game-card .game-icon {
      filter: brightness(0) invert(1);
    }

    .game-title {
      color: var(--text);
      font-weight: 700;
      font-size: 1.05rem;
      line-height: 1.3;
      margin-bottom: 10px;
    }

    .play-badge {
      background: #222222;
      color: #ffffff;
      font-size: 0.8rem;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 50px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .game-card:hover .play-badge {
      background: var(--green);
      color: #ffffff;
    }

    .footer-disclaimer {
      position: fixed;
      bottom: 5px;
      left: 0;
      width: 100%;
      text-align: center;
      color: #666666;
      font-size: 12px;
      pointer-events: none;
      z-index: 9999;
    }

    /* Responsive */
    @media (max-width: 480px) {
      .games-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 15px;
      }
      .page-title { font-size: 2rem; }
    }
  </style>
</head>
<body>
