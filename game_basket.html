<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Build Your Basket</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

  <style>
    /* Global Styles */
    :root {
      --green: #4ade80;
      --muted: #9ca3af;
    }
    * { 
      box-sizing: border-box; 
      font-family: 'Poppins', sans-serif; 
      margin: 0; 
      padding: 0; 
      -webkit-tap-highlight-color: transparent; 
    }
    
    body { 
      touch-action: none; 
      overflow: hidden; 
      background-image: url('assets/build basket/background.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-color: #061106;
    }

    .game-container { 
      max-width: 480px; 
      margin: 0 auto; 
      padding: 10px; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      position: relative;
    }

    /* Buttons & Typography */
    .btn-primary {
      background: var(--green);
      color: #000;
      border: none;
      padding: 14px 24px;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      box-shadow: none !important; 
      outline: none;
      transition: transform 0.1s;
    }
    .btn-primary:active { transform: scale(0.98); }
    
    .btn-secondary {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      box-shadow: none !important;
      outline: none;
    }
    
    .mode-card { 
      background: rgba(255,255,255,0.05); 
      border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 16px; 
      padding: 20px; 
      margin-bottom: 16px; 
      text-align: center; 
      cursor: pointer; 
      transition: 0.2s; 
    }
    .mode-card:hover { border-color: var(--green); }

    /* Top Header/HUD */
    .game-header { 
      display: flex; justify-content: space-between; align-items: center; 
      width: 100%; margin-bottom: 5px; 
      position: relative; z-index: 20; 
    }
    .basket-hud { display: flex; align-items: center; gap: 15px; }
    .case-counter { font-weight: 800; color: white; text-transform: uppercase; letter-spacing: 1px; font-size: 0.85rem; }
    .score-display { font-weight: 800; color: var(--green); font-size: 1.1rem; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 8px; border: 1px solid var(--green); }

    /* --- RESPONSIVE GAME BOARD --- */
    .game-board {
      position: absolute; 
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    .game-board-bg {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      display: block; pointer-events: none; object-fit: fill; z-index: 0;
    }

    /* CASE TEXT */
    #case-text {
      position: absolute; top: 11%; left: 8%; width: 84%; height: 16%; 
      display: flex; align-items: center; justify-content: center; text-align: center; 
      color: black; font-weight: 700; font-size: clamp(0.75rem, 3.2vw, 1.05rem); line-height: 1.2; padding: 0 5px; z-index: 15;
    }

    /* QUESTION TEXT */
    #question-text {
      position: absolute; top: 28.5%; left: 7%; width: 86%; height: 7%; 
      display: flex; align-items: center; justify-content: center; text-align: center; 
      color: black; font-weight: 800; font-size: clamp(0.8rem, 3.5vw, 1.1rem); line-height: 1.15; z-index: 15;
    }

    /* Options Area overlaying the shelves */
    .options-zone { 
      position: absolute; top: 40.5%; left: 10%; width: 80%; height: 22%; 
      display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 5px; z-index: 15;
    }
    
    .item-slot {
      width: 100%; height: 100%;
      display: flex; align-items: flex-end; justify-content: center;
    }

    /* Draggable Item Card */
    .drag-item { 
      width: 100%; height: 100%; 
      background: transparent; border: none; padding: 0; cursor: grab; 
      display: flex; flex-direction: column; align-items: center; justify-content: flex-end;
      touch-action: none; z-index: 25;
    }
    .drag-item img { 
      width: auto; height: auto; 
      max-width: 90px; max-height: 75px;
      object-fit: contain; pointer-events: none; filter: none !important; 
    }
    .drag-item div { display: none; } 
    
    /* Shopping Cart Drop Zone */
    .cart-zone { 
      position: absolute; top: 68%; left: 12%; width: 76%; height: 18%;
      display: flex; flex-direction: row; flex-wrap: wrap; gap: 2%; 
      justify-content: center; align-items: center; align-content: center; 
      background: transparent; border-radius: 12px; z-index: 15; box-shadow: none !important; 
    }
    .cart-zone.drag-over { background: transparent; }
    
    .cart-empty-text {
      position: absolute; color: rgba(255, 255, 255, 0.5); font-weight: 600; font-size: 1.2rem; pointer-events: none;
    }
    
    .cart-zone .drag-item { 
      width: 48%; 
      height: 48%; 
      justify-content: center; 
    }
    .cart-zone .drag-item img {
      max-width: 100% !important; 
      max-height: 100% !important; 
      width: auto; height: auto;
    }
    
    /* Toast Notification */
    .toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 15px 30px; border-radius: 50px; font-weight: 600; font-size: 1.1rem; opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 90%; max-width: 400px;}
    .toast.show { opacity: 1; }

    /* --- FEEDBACK MODAL STYLES --- */
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85);
      display: flex; align-items: center; justify-content: center;
      z-index: 5000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.show {
      opacity: 1; pointer-events: auto;
    }
    .modal-content {
      background: #111;
      border: 2px solid var(--green);
      border-radius: 20px;
      padding: 25px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      color: white;
      transform: translateY(20px);
      transition: transform 0.3s;
      max-height: 80vh;
      overflow-y: auto;
    }
    .modal-overlay.show .modal-content {
      transform: translateY(0);
    }
    .claim-item {
      background: rgba(255, 255, 255, 0.05);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
      text-align: left;
      font-size: 0.9rem;
      border-left: 4px solid var(--green);
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;display:none;"></canvas>
  <div class="toast" id="toast"></div>

  <div class="game-container" id="screen-start" style="text-align: center; justify-content: center; z-index: 20;">
    <img src="assets/build basket/buildBasket_gameLogo.png" alt="Basket" style="max-width: 250px; margin: 0 auto 10px; display: block; mix-blend-mode: screen;">
    
    <div style="color: white; font-size: 2.5rem; font-weight: 800; margin-bottom: 10px;">Build Basket</div>
    <p style="color: #d1d5db; margin-bottom: 25px; line-height: 1.4; font-size: 0.95rem;">
      Read the patient case, then drag and drop<br>the correct medications into their basket.<br><br>
      <strong style="color: white; font-size: 1.05rem;">+10 pts for correct items, -10 pts for wrong ones</strong>
    </p>
    
    <img src="assets/build basket/Start_Game_Button.png" alt="Start Game" style="max-width: 300px; cursor: pointer; margin: 0 auto; box-shadow: none;" onclick="proceedFromStart()">
    
    <img src="assets/build basket/Brought To You By.png" alt="Brought to you by" style="max-width: 200px; margin: 40px auto 0; display: block;">

    <button class="btn-secondary" id="btn-exit-start" style="position: absolute; top: 15px; left: 15px; width: auto; padding: 6px 12px; font-size: 0.8rem; z-index: 50; border-color: var(--green); color: var(--green);" onclick="goBack()">← Back to App</button>
  </div>

  <div class="game-container" id="screen-game" style="display: none; padding: 0; width: 100%; height: 100vh;">
    
    <img src="assets/build basket/case_Question_bg.png" alt="Game Board Background" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 0; pointer-events: none;">

    <div class="game-header" style="position: absolute; top: 15px; left: 15px; width: calc(100% - 30px); z-index: 20;">
      <button class="btn-secondary" style="background: rgba(255,255,255,0.1); border: none; padding: 6px 14px; width: auto; font-size: 0.85rem;" onclick="goBack()">← Exit</button>
      <div class="basket-hud">
        <div class="case-counter" id="case-counter">CASE 1 / 5</div>
        <div class="score-display" id="hud-score">0 pts</div>
      </div>
    </div>

    <div class="game-board">
      <div id="case-text">Loading case...</div>
      <div id="question-text">Loading question...</div>

      <div class="options-zone" id="options-zone"></div>

      <div class="cart-zone" id="cart-zone">
        <div class="cart-empty-text" id="cart-empty-text">Drop items here</div>
      </div>

      <img src="assets/build basket/confirm_button.png" alt="Confirm Basket" style="position: absolute; bottom: 4%; left: 50%; transform: translateX(-50%); width: 75%; max-width: 320px; cursor: pointer; z-index: 30; box-shadow: none; filter: none;" id="btn-confirm" onclick="confirmBasket()">
    </div>

  </div>

  <div class="game-container" id="screen-result" style="display: none; text-align: center; justify-content: center; z-index: 20;">
    <div style="font-size: 4rem; margin-bottom: 10px;">🏆</div>
    <div style="color: white; font-size: 2.5rem; font-weight: 800;" id="result-title">Game Over</div>
    <div style="font-weight:800; font-size: 3.5rem; color: var(--green); margin-bottom: 20px; line-height: 1;" id="result-score">0 pts</div>
    <div id="result-actions" style="width: 100%;"></div>
  </div>

  <div class="modal-overlay" id="feedback-modal">
    <div class="modal-content">
      <h2 style="color: var(--green); margin-bottom: 15px; font-weight: 800; font-size: 1.8rem;">Case Results</h2>
      <div id="feedback-content" style="margin-bottom: 20px;"></div>
      <button class="btn-primary" onclick="closeFeedbackModal()">Continue to Next Case</button>
    </div>
  </div>

  <script>
    // --- UPDATED GAME DATA WITH CLAIMS ---
    const cases = [
      {
        scenario: "A 32-year-old professional is juggling work deadlines and night shifts. They feel mentally drained, physically tired, and have mild tension headaches. No fever or other health issues.",
        question: "Which products would you include<br>in the patient’s basket?",
        options: [
          { id: "o1", name: "Panadol Advance", img: "assets/build basket/Panadol advance.png", isCorrect: false },
          { id: "o2", name: "Panadol Extra", img: "assets/build basket/panadol_extra.png", isCorrect: true, claim: "Extra effective pain relief." },
          { id: "o3", name: "Centrum Energy", img: "assets/build basket/Centrum_energy_pack.png", isCorrect: true, claim: "a multivitamin to support the body’s daily energy needs." },
          { id: "o4", name: "Centrum Women", img: "assets/build basket/CENTRUM_WOMEN.png", isCorrect: false }
        ]
      },
      {
        scenario: "A 38-year-old recovering from seasonal flu has fever, body aches, headache, and nasal congestion. They report low energy and difficulty focusing on work tasks.",
        question: "Which products would you include<br>in the patient’s basket?",
        options: [
          { id: "o1", name: "Panadol Cold and Flu", img: "assets/build basket/Cold & Flu Day Pack.png", isCorrect: true, claim: "effective relief from blocked & runny nose." },
          { id: "o2", name: "Panadol Extra", img: "assets/build basket/panadol_extra.png", isCorrect: false },
          { id: "o3", name: "Centrum Energy", img: "assets/build basket/Centrum_energy_pack.png", isCorrect: true, claim: "a multivitamin to support the body’s daily energy needs." },
          { id: "o4", name: "Centrum Men", img: "assets/build basket/CENTRUM_MEN.png", isCorrect: false }
        ]
      },
      {
        scenario: "A 44-year-old man wants a daily routine to maintain overall wellness. He sometimes feels tired and wants to support immunity, muscle function, and heart health.",
        question: "Which products would you include<br>in the patient’s basket?",
        options: [
          { id: "o1", name: "Centrum Men", img: "assets/build basket/CENTRUM_MEN.png", isCorrect: true, claim: "Supports energy, immunity, metabolism + muscle function." },
          { id: "o2", name: "Centrum Energy", img: "assets/build basket/Centrum_energy_pack.png", isCorrect: true, claim: "a multivitamin to support the body’s daily energy needs." },
          { id: "o3", name: "Panadol Advance", img: "assets/build basket/Panadol advance.png", isCorrect: false },
          { id: "o4", name: "Panadol Cold and Flu", img: "assets/build basket/Cold & Flu Day Pack.png", isCorrect: false }
        ]
      },
      {
        scenario: "A 36-year-old woman experiences mild menstrual cramps and occasional fatigue. She is conscious about her hair, skin, and nails, and wants to support bone and immune health daily.",
        question: "Which products would you include<br>in the patient’s basket?",
        options: [
          { id: "o1", name: "Panadol Advance", img: "assets/build basket/Panadol advance.png", isCorrect: true, claim: "effective pain relief, gentle on stomach." },
          { id: "o2", name: "Centrum Women", img: "assets/build basket/CENTRUM_WOMEN.png", isCorrect: true, claim: "supports energy, immunity, metabolism + healthy skin, hair and nails ." },
          { id: "o3", name: "Panadol Cold and Flu", img: "assets/build basket/Cold & Flu Day Pack.png", isCorrect: false },
          { id: "o4", name: "Centrum Men", img: "assets/build basket/CENTRUM_MEN.png", isCorrect: false }
        ]
      },
      {
        scenario: "A 30-year-old mother has a mild cold with headache, mild fever, and congestion. She feels exhausted from caring for her young children and managing work.",
        question: "Which products would you include<br>in the patient’s basket?",
        options: [
          { id: "o1", name: "Panadol Cold and Flu", img: "assets/build basket/Cold & Flu Day Pack.png", isCorrect: true, claim: "effective relief from blocked & runny nose." },
          { id: "o2", name: "Centrum Energy", img: "assets/build basket/Centrum_energy_pack.png", isCorrect: true, claim: "a multivitamin to support the body’s daily energy needs." },
          { id: "o3", name: "Panadol Extra", img: "assets/build basket/panadol_extra.png", isCorrect: false },
          { id: "o4", name: "Centrum Women", img: "assets/build basket/CENTRUM_WOMEN.png", isCorrect: false }
        ]
      }
    ];

    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const GAME_ID = 'basket';
    
    let totalScore = 0;
    let currentCaseIndex = 0;
    
    let activeItem = null;
    let initialX = 0, initialY = 0;

    window.onload = () => {
      if (!uid) document.getElementById('btn-exit-start').style.display = 'none';
      document.addEventListener('mousemove', dragMove);
      document.addEventListener('mouseup', dragEnd);
      document.addEventListener('touchmove', dragMove, {passive: false});
      document.addEventListener('touchend', dragEnd, {passive: false});
    };

    function goBack() { 
      if (uid) window.location.href = 'index.html'; 
      else location.reload(); 
    }

    function proceedFromStart() {
      document.getElementById('screen-start').style.display = 'none';
      startGame();
    }

    function startGame() {
      document.getElementById('screen-game').style.display = 'flex';
      totalScore = 0;
      currentCaseIndex = 0;
      loadCase();
    }

    function updateCartText() {
      const cart = document.getElementById('cart-zone');
      const emptyText = document.getElementById('cart-empty-text');
      const hasItems = cart.querySelectorAll('.drag-item').length > 0;
      emptyText.style.display = hasItems ? 'none' : 'block';
    }

    function loadCase() {
      if (currentCaseIndex >= cases.length) {
        finishGame();
        return;
      }

      const caseData = cases[currentCaseIndex];
      document.getElementById('case-counter').textContent = `CASE ${currentCaseIndex + 1} / ${cases.length}`;
      document.getElementById('hud-score').textContent = totalScore + " pts";
      
      document.getElementById('case-text').textContent = caseData.scenario;
      document.getElementById('question-text').innerHTML = caseData.question;
      
      const optionsZone = document.getElementById('options-zone');
      const cartZone = document.getElementById('cart-zone');
      
      optionsZone.innerHTML = '';
      const itemsInCart = cartZone.querySelectorAll('.drag-item');
      itemsInCart.forEach(item => item.remove());
      updateCartText();

      caseData.options.forEach(opt => {
        const slotEl = document.createElement('div');
        slotEl.className = 'item-slot';

        const itemEl = document.createElement('div');
        itemEl.className = 'drag-item';
        itemEl.dataset.correct = opt.isCorrect;
        itemEl.dataset.name = opt.name;
        itemEl.originalSlot = slotEl; 
        
        itemEl.innerHTML = `
          <img src="${opt.img}" alt="${opt.name}">
          <div>${opt.name}</div>
        `;
        
        itemEl.addEventListener('mousedown', dragStart);
        itemEl.addEventListener('touchstart', dragStart, {passive: false});
        
        slotEl.appendChild(itemEl);
        optionsZone.appendChild(slotEl);
      });
    }

    // --- DRAG AND DROP LOGIC ---
    function dragStart(e) {
      if(e.target.closest('.drag-item')) {
        activeItem = e.target.closest('.drag-item');
        const evt = e.touches ? e.touches[0] : e;
        
        const rect = activeItem.getBoundingClientRect();
        
        activeItem.style.width = rect.width + 'px';
        activeItem.style.height = rect.height + 'px';

        activeItem.style.position = 'fixed';
        activeItem.style.left = rect.left + 'px';
        activeItem.style.top = rect.top + 'px';
        activeItem.style.zIndex = 1000;
        activeItem.style.margin = 0;

        initialX = evt.clientX - rect.left;
        initialY = evt.clientY - rect.top;
      }
    }

    function dragMove(e) {
      if(!activeItem) return;
      e.preventDefault(); 
      const evt = e.touches ? e.touches[0] : e;
      activeItem.style.left = (evt.clientX - initialX) + 'px';
      activeItem.style.top = (evt.clientY - initialY) + 'px';

      const cartRect = document.getElementById('cart-zone').getBoundingClientRect();
      const itemRect = activeItem.getBoundingClientRect();
      const itemCX = itemRect.left + itemRect.width/2;
      const itemCY = itemRect.top + itemRect.height/2;

      if (itemCX > cartRect.left && itemCX < cartRect.right && itemCY > cartRect.top && itemCY < cartRect.bottom) {
        document.getElementById('cart-zone').classList.add('drag-over');
      } else {
        document.getElementById('cart-zone').classList.remove('drag-over');
      }
    }

    function dragEnd(e) {
      if(!activeItem) return;
      
      const cart = document.getElementById('cart-zone');
      cart.classList.remove('drag-over');

      const cartRect = cart.getBoundingClientRect();
      const itemRect = activeItem.getBoundingClientRect();
      
      const itemCX = itemRect.left + itemRect.width/2;
      const itemCY = itemRect.top + itemRect.height/2;

      activeItem.style.position = 'static';
      activeItem.style.left = 'auto';
      activeItem.style.top = 'auto';
      activeItem.style.zIndex = '25';
      activeItem.style.margin = '0';

      activeItem.style.width = '';
      activeItem.style.height = '';

      if (itemCX > cartRect.left && itemCX < cartRect.right && itemCY > cartRect.top && itemCY < cartRect.bottom) {
        cart.appendChild(activeItem);
      } else {
        activeItem.originalSlot.appendChild(activeItem);
      }
      
      updateCartText();
      activeItem = null;
    }

    // --- CONFIRM BASKET, SCORING & FEEDBACK ---
    function confirmBasket() {
      const cart = document.getElementById('cart-zone');
      const itemsInCart = cart.querySelectorAll('.drag-item');
      
      if(itemsInCart.length === 0) {
        showToast("Add items to the basket first!");
        return;
      }

      let casePoints = 0;
      let feedbackHTML = "";

      itemsInCart.forEach(item => {
        const isCorrect = item.dataset.correct === 'true';
        const itemName = item.dataset.name;
        const optData = cases[currentCaseIndex].options.find(o => o.name === itemName);

        if (isCorrect) {
          casePoints += 10;
          feedbackHTML += `<div class="claim-item">
            <strong style="color: var(--green); display: block; margin-bottom: 3px;">✅ ${itemName}</strong>
            ${optData.claim}
          </div>`;
        } else {
          casePoints -= 10;
          feedbackHTML += `<div class="claim-item" style="border-left-color: #ef4444;">
            <strong style="color: #ef4444; display: block; margin-bottom: 3px;">❌ ${itemName}</strong>
            Incorrect selection for this patient's symptoms.
          </div>`;
        }
      });

      // Show total points earned/lost for this specific case at the top of the modal
      const scoreHeaderColor = casePoints > 0 ? "var(--green)" : (casePoints < 0 ? "#ef4444" : "white");
      const scoreHeader = `<h3 style="margin-bottom: 15px; color: ${scoreHeaderColor};">Score: ${casePoints > 0 ? '+'+casePoints : casePoints} pts</h3>`;

      document.getElementById('feedback-content').innerHTML = scoreHeader + feedbackHTML;
      document.getElementById('feedback-modal').classList.add('show');

      // Update total score in the background
      totalScore += casePoints;
      if (totalScore < 0) totalScore = 0;
      document.getElementById('hud-score').textContent = totalScore + " pts";
    }

    function closeFeedbackModal() {
      document.getElementById('feedback-modal').classList.remove('show');
      currentCaseIndex++;
      
      // Check if that was the last case
      if (currentCaseIndex >= cases.length) {
        finishGame();
      } else {
        loadCase();
      }
    }

   function finishGame() {
      document.getElementById('screen-game').style.display = 'none';
      document.getElementById('screen-result').style.display = 'flex';
      
      document.getElementById('result-score').textContent = totalScore + " pts";

      if(totalScore > 0) launchConfetti(3000); 

      const actionsDiv = document.getElementById('result-actions');
      const collectBtnHTML = `<img src="assets/build basket/Collect Points & CompleteButton.png" alt="Collect Points" style="width: 80%; max-width: 320px; cursor: pointer; margin: 0 auto; display: block;" onclick="processPoints()">`;
      actionsDiv.innerHTML = collectBtnHTML;
    }

    function processPoints() {
      const actionsDiv = document.getElementById('result-actions');
      actionsDiv.innerHTML = "<div style='color: white;'>Processing...</div>";

      if (uid) {
        window.location.href = `index.html?rewardGame=${GAME_ID}&rewardPts=${totalScore}`;
      } else {
        const payload = JSON.stringify({ type: "game_reward", gameId: GAME_ID, points: totalScore, nonce: Date.now() });
        const qr = qrcode(0, 'L');
        qr.addData(payload);
        qr.make();
        actionsDiv.innerHTML = `
          <div style="background:white; padding:10px; display:inline-block; border-radius:10px; margin-bottom:10px;">
            ${qr.createImgTag(5)}
          </div>
          <p style="color:var(--muted); font-size:0.9rem; margin-bottom: 20px;">Scan this QR with your Haleon app to collect points.</p>

    function showToast(msg) {
      const toast = document.getElementById("toast"); 
      toast.innerHTML = msg; 
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function launchConfetti(duration) {
      const canvas = document.getElementById("confetti-canvas");
      if(!canvas) return;
      const ctx = canvas.getContext("2d");
      canvas.style.display = "block";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const pieces = [];
      const colors = ["#4ade80", "#22c55e", "#f0f4f8", "#facc15", "#60a5fa", "#f472b6"];
      for (let i = 0; i < 100; i++) pieces.push({ x: Math.random() * canvas.width, y: -10 - Math.random() * 200, r: 4 + Math.random() * 6, color: colors[Math.floor(Math.random() * colors.length)], vx: (Math.random() - 0.5) * 4, vy: 2 + Math.random() * 4, rot: Math.random() * 360, rs: (Math.random() - 0.5) * 6 });
      const end = Date.now() + duration;
      (function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach((p) => {
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((p.rot * Math.PI) / 180); ctx.fillStyle = p.color;
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6); ctx.restore();
          p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.rs;
        });
        if (Date.now() < end) requestAnimationFrame(frame);
        else { ctx.clearRect(0, 0, canvas.width, canvas.height); canvas.style.display = "none"; }
      })();
    }
  </script>
