<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Spot The Oppurtuinity</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

<style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --green: #10B981;
      --red: #ef4444;
      --dialog-bg: rgba(10, 10, 10, 0.95);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      user-select: none;
    }

    /* Rotation Overlay for Portrait Mobile */
    #rotate-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      color: white;
      z-index: 100000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      padding: 20px;
    }

    #rotate-overlay svg {
      width: 80px; height: 80px; margin-bottom: 20px;
      animation: rotateIcon 2s infinite ease-in-out;
    }

    @keyframes rotateIcon {
      0% { transform: rotate(0deg); }
      50% { transform: rotate(-90deg); }
      100% { transform: rotate(-90deg); }
    }

    #rotate-overlay h2 { font-size: 24px; font-weight: 700; margin-bottom: 10px; }
    #rotate-overlay p { font-size: 16px; color: #ccc; max-width: 80%; line-height: 1.4; }

    @media (orientation: portrait) and (max-width: 800px) {
      #rotate-overlay { display: flex; }
    }

    body {
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
      width: 100vw;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* Fixed Scale 16:9 Container */
    .game-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      aspect-ratio: 16 / 9; 
      max-width: calc(100dvh * (16 / 9)); 
      max-height: calc(100vw * (9 / 16)); 
      overflow: hidden;
      container-type: inline-size; 
      background: #000;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0; left: 0;
    }

    .screen.active { display: flex; }

    .brand-logos {
      position: absolute; top: 3cqi; right: 3cqi; width: 20cqi; z-index: 10; transition: opacity 0.3s;
    }
    .brand-logos img { width: 100%; height: auto; }

    /* --- Start Screen --- */
    #start-screen {
      background: url('assets/Spot Game/gameBg.png') no-repeat center center;
      background-size: cover;
    }
    #start-screen::before {
      content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.7); z-index: -1;
    }
    #start-screen .game-logo { width: 25cqi; margin-bottom: 2cqi; animation: float 3s ease-in-out infinite; }
    #start-screen h1 { font-size: 4cqi; font-weight: 800; margin-bottom: 1cqi; text-align: center; }
    #start-screen p { font-size: 1.6cqi; text-align: center; max-width: 60cqi; margin-bottom: 3cqi; line-height: 1.5; color: #ddd; }
    
    .btn-action {
      cursor: pointer; border: none; background: var(--green); color: #fff;
      padding: 1.5cqi 3cqi; border-radius: 4cqi; font-size: 1.5cqi; font-weight: 700;
      transition: transform 0.2s, background 0.2s;
    }
    .btn-action:hover { transform: scale(1.05); background: #0d9668; }
    .btn-action img { width: 20cqi; display: block; }

    /* --- Game Screen --- */
    #game-screen {
      background: url('assets/Spot Game/shelf.png') no-repeat center center;
      background-size: 100% 100%; 
    }

    .game-area {
      position: relative; width: 100%; height: 100%; max-width: 1600px; 
    }

    /* -------------------------------------------------------------
       DROP ZONES
       ------------------------------------------------------------- */
    .drop-zone {
      position: absolute;
      border-radius: 8px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      transition: background 0.2s, border 0.2s;
      z-index: 5;
      /* Borders hidden for live gameplay */
      border: 2px dashed transparent;
    }
    /* .drop-zone.highlight { background: rgba(255, 255, 255, 0.4); border-color: white; } */

    /* Panadol Zones ('P' marks) */
    #zone-p1 { top: 16%; left: 21%; width: 14%; height: 9%; }
    #zone-p2 { top: 16%; left: 26%; width: 14%; height: 9%; }
    #zone-p3 { top: 28%; left: 22%; width: 18%; height: 11%; }

    /* Sensodyne Zone ('S' mark) */
    #zone-s1 { top: 17%; left: 64%; width: 18%; height: 9%; }

    /* Centrum Zones ('C' marks in display stand) */
    #zone-c1 { top: 43%; left: 67%; width: 10%; height: 10%; }
    #zone-c2 { top: 56%; left: 67%; width: 20%; height: 10%; }
    #zone-c3 { top: 43%; left: 72%; width: 10%; height: 10%; }

    /* -------------------------------------------------------------
       START CONTAINER
       ------------------------------------------------------------- */
    .items-container {
      position: absolute;
      top: 75%; 
      left: 30%; 
      width: 40%; 
      height: 25%;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 2%;
      padding: 1%;
      z-index: 10;
    }

    .start-slot {
      flex: 1;
      height: 100%;
      display: flex; 
      align-items: center; 
      justify-content: center;
    }

    .draggable-item {
      object-fit: cover;
      cursor: grab; touch-action: none; position: static;
      z-index: 100; transition: opacity 0.3s, transform 0.2s;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.5));
    }

    /* -------------------------------------------------------------
       GLOBAL SIZING RULES (Ensures Uniformity)
       ------------------------------------------------------------- */
    /* Same size for all Panadol and Centrum packs */
    .draggable-item[data-group="panadol"],
    .draggable-item[data-group="centrum"] {
      height: 40%;
      width: auto;
    }

    /* Enlarge Sensodyne explicitly */
    .draggable-item[data-group="sensodyne"] {
      width: 10cqi;
      height: auto;
    }

    .draggable-item.placed { opacity: 0; cursor: default; }

    .is-dragging {
      position: fixed !important; z-index: 2000 !important;
      pointer-events: none; transform: scale(1.2) !important;
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
    }

    /* Placed items on the shelf */
    .drop-zone .draggable-item {
      margin-bottom: 0; cursor: default; opacity: 1; 
      transform: none !important; 
    }

    /* Make items in place much bigger */
    .drop-zone .draggable-item[data-group="panadol"],
    .drop-zone .draggable-item[data-group="centrum"] {
      height: 80% !important;
    }

    .drop-zone .draggable-item[data-group="sensodyne"] {
      width: 60% !important;
    }

    /* --- Dialog Overlay --- */
    .dialog-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.85); display: flex; align-items: center; justify-content: center;
      z-index: 3000; opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .dialog-overlay.show { opacity: 1; pointer-events: all; }

    .dialog-box {
      background: var(--dialog-bg); border: 2px solid var(--border, #333); border-radius: 12px;
      padding: 15px; text-align: center; max-width: 550px; width: 90%; max-height: 90vh; overflow-y: auto;
      transform: translateY(20px); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .dialog-overlay.show .dialog-box { transform: translateY(0); }

    .dialog-img { height: 75px; width: auto; max-width: 150px; margin-bottom: 8px; object-fit: contain; }
    .dialog-title { font-size: 1.3rem; font-weight: 800; margin-bottom: 8px; }
    
    .dialog-desc {
      font-size: 0.9rem; color: #fff; font-weight: 500;
      margin-bottom: 15px; background: rgba(255,255,255,0.05);
      padding: 10px; border-radius: 8px; line-height: 1.4; text-align: left;
    }
    
    .dialog-box .btn-action {
      padding: 8px 16px;
      font-size: 1rem;
      border-radius: 8px;
    }

    .dialog-correct-title { color: var(--green); }
    .dialog-error-title { color: var(--red); }
    .dialog-correct-text { border-left: 4px solid var(--green); }
    .dialog-error-text { border-left: 4px solid var(--red); }

    /* End Screens */
    .end-screen-bg { background: rgba(0,0,0,0.85); }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
  </style>
</head>
<body>
  <div id="rotate-overlay">
    <svg fill="white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M16.48 2.52c3.27 1.55 5.61 4.72 5.97 8.48h1.5C23.44 4.84 18.29 0 12 0 10.87 0 9.78.16 8.74.45l2.42 2.42c.27-.03.55-.05.84-.05 1.55 0 2.97.58 4.05 1.55l-2.02 2.02h5.5V.95l-3.05 1.57zm-8.96 18.96c-3.27-1.55-5.61-4.72-5.97-8.48h-1.5C.56 19.16 5.71 24 12 24c1.13 0 2.22-.16 3.26-.45l-2.42-2.42c-.27.03-.55.05-.84.05-1.55 0-2.97-.58-4.05-1.55l2.02-2.02h-5.5v5.5l3.05-1.57z"/>
    </svg>
    <h2>Rotate Device</h2>
    <p>Please rotate your phone to landscape mode.</p>
  </div>

  <canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;display:none;"></canvas>

  <div class="game-wrapper">
    <div class="brand-logos" id="brand-logos">
      <img src="assets/Spot Game/brought to you by.png" alt="Brought to you by Panadol and Centrum" onerror="this.style.display='none';">
    </div>

    <div id="start-screen" class="screen active">
      <img src="assets/Spot Game/gameLogo.png" alt="Game Logo" class="game-logo" onerror="this.style.display='none';">
      <h1>Spot The Oppurtuinity</h1>
      <p>Drag the 7 products to their scientifically correct places on the pharmacy shelves.<br><strong>Finish within 60s: 50 pts! Or 5 pts per item placed.</strong></p>
      <button class="btn-action" onclick="startGame()" style="padding:0; background:none;">
        <img src="assets/Spot Game/startGameButton.png" alt="Start Game" onerror="this.outerHTML='<button class=\'btn-action\' onclick=\'startGame()\'>Start Game</button>'">
      </button>
    </div>

    <div id="game-screen" class="screen">
      <div class="game-area" id="game-area">
        
        <div class="drop-zone" id="zone-p1" data-group="panadol"></div>
        <div class="drop-zone" id="zone-p2" data-group="panadol"></div>
        <div class="drop-zone" id="zone-p3" data-group="panadol"></div>

        <div class="drop-zone" id="zone-s1" data-group="sensodyne"></div>

        <div class="drop-zone" id="zone-c1" data-group="centrum"></div>
        <div class="drop-zone" id="zone-c2" data-group="centrum"></div>
        <div class="drop-zone" id="zone-c3" data-group="centrum"></div>

        <div class="items-container" id="items-container">
          <div class="start-slot"><img src="assets/Spot Game/SENSODYNE.png" class="draggable-item" data-id="senso" data-group="sensodyne" alt="Sensodyne" onerror="this.src='assets/Spot Game/SENSODYNE.png'"></div>
          <div class="start-slot"><img src="assets/Spot Game/panadol_extra.png" class="draggable-item" data-id="px" data-group="panadol" alt="Panadol Extra"></div>
          <div class="start-slot"><img src="assets/Spot Game/Panadol advance.png" class="draggable-item" data-id="pa" data-group="panadol" alt="Panadol Advance"></div>
          <div class="start-slot"><img src="assets/Spot Game/Cold & Flu Day Pack.png" class="draggable-item" data-id="pcf" data-group="panadol" alt="Cold & Flu Day"></div>
          <div class="start-slot"><img src="assets/Spot Game/Centrum_energy_pack.png" class="draggable-item" data-id="ce" data-group="centrum" alt="Centrum Energy"></div>
          <div class="start-slot"><img src="assets/Spot Game/CENTRUM_MEN.png" class="draggable-item" data-id="cm" data-group="centrum" alt="Centrum Men"></div>
          <div class="start-slot"><img src="assets/Spot Game/CENTRUM_WOMEN.png" class="draggable-item" data-id="cw" data-group="centrum" alt="Centrum Women"></div>
        </div>

      </div>
    </div>

    <div id="screen-result" class="screen end-screen-bg" style="text-align: center; justify-content: center; z-index: 20;">
      <div style="font-size: 5cqi; margin-bottom: 10px;">🏆</div>
      <div style="color: white; font-size: 4cqi; font-weight: 800;" id="result-title">Perfect!</div>
      <div style="font-weight:800; font-size: 4.5cqi; color: var(--green); margin-bottom: 20px; line-height: 1;" id="result-score">50 pts</div>
      <div id="result-actions" style="width: 100%;"></div>
    </div>

    <div class="dialog-overlay" id="dialog-overlay">
      <div class="dialog-box" id="dialog-box">
        <img src="" alt="Product" class="dialog-img" id="dialog-img">
        <h2 class="dialog-title" id="dialog-title">Title</h2>
        <div class="dialog-desc" id="dialog-desc">Description</div>
        <button class="btn-action" onclick="closeDialog()">Continue</button>
      </div>
    </div>

  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const GAME_ID = 'spot';

    let placedItemsCount = 0;
    const totalItems = 7;
    let spotTimerInterval = null;
    let spotTimeLeft = 60;
    let dynamicScore = 0;

    // EXACT TEXT PROVIDED IN PROMPT
    const productsData = {
      "senso": { 
        name: "Sensodyne", img: "assets/Spot Game/SENSODYNE.png",
        correct: "This product belongs in the oral care section at eye level, because shoppers browse and compare within this category.",
        wrong: "The correct placement is the oral care section, because this is a routine category purchase, not a pharmacist-led recommendation."
      },
      "px": { 
        name: "Panadol Extra", img: "assets/Spot Game/panadol_extra.png",
        correct: "This product belongs in the pain relief / OTC section, because it provides fast relief for headache and fatigue and needs high visibility.",
        wrong: "The correct placement is the pain relief section, because it is a symptom-driven product, not a daily supplement."
      },
      "pa": { 
        name: "Panadol Advance", img: "assets/Spot Game/Panadol advance.png",
        correct: "This product belongs in the pain relief / OTC section, because patients actively look for quick pain relief solutions.",
        wrong: "The correct placement is the pain relief section, because it’s used for immediate symptom relief, not preventive care."
      },
      "pcf": { 
        name: "Panadol Cold & Flu", img: "assets/Spot Game/Cold & Flu Day Pack.png",
        correct: "This product belongs in the cold & flu / OTC section, because it targets specific symptoms like fever, congestion, and body aches.",
        wrong: "The correct placement is the cold & flu section, because grouping by condition helps patients find the right solution faster."
      },
      "ce": { 
        name: "Centrum Energy", img: "assets/Spot Game/Centrum_energy_pack.png",
        correct: "This product belongs in the vitamins & supplements section (and near checkout), because it supports energy and can drive impulse purchase.",
        wrong: "The correct placement is the vitamins section, because it’s a daily energy supplement, not an immediate pain relief product."
      },
      "cm": { 
        name: "Centrum Men", img: "assets/Spot Game/CENTRUM_MEN.png",
        correct: "This product belongs in the vitamins & supplements section, because it provides daily nutritional support tailored for men.",
        wrong: "The correct placement is the vitamins section, because it’s a preventive wellness product, not a treatment for symptoms."
      },
      "cw": { 
        name: "Centrum Women", img: "assets/Spot Game/CENTRUM_WOMEN.png",
        correct: "This product belongs in the vitamins & supplements section, because it supports women’s daily health and specific nutritional needs.",
        wrong: "The correct placement is the vitamins section, because it’s a routine supplement, not for immediate symptom relief."
      }
    };

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    function startGame() {
      document.getElementById('brand-logos').style.opacity = '0';
      setTimeout(() => document.getElementById('brand-logos').style.display = 'none', 300);
      showScreen('game-screen');
      initDragAndDrop();

      // Add timer HUD
      const gameArea = document.getElementById('game-area');
      if (!document.getElementById('spot-timer-hud')) {
        const timerHud = document.createElement('div');
        timerHud.id = 'spot-timer-hud';
        timerHud.style.cssText = 'position:absolute;top:2%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.7);border:2px solid #10B981;border-radius:12px;padding:6px 18px;color:#10B981;font-weight:800;font-size:2cqi;z-index:50;letter-spacing:1px;';
        timerHud.innerHTML = '⏱ <span id="spot-timer-display">60s</span>';
        gameArea.appendChild(timerHud);
      }

      // Start 60s timer
      spotTimeLeft = 60;
      placedItemsCount = 0;
      dynamicScore = 0;
      updateSpotTimer();
      spotTimerInterval = setInterval(() => {
        spotTimeLeft--;
        updateSpotTimer();
        if (spotTimeLeft <= 0) {
          clearInterval(spotTimerInterval);
          dynamicScore = placedItemsCount * 5;
          finishGame();
        }
      }, 1000);
    }

    function updateSpotTimer() {
      const el = document.getElementById('spot-timer-display');
      if (el) {
        el.textContent = spotTimeLeft + 's';
        const hud = document.getElementById('spot-timer-hud');
        if (hud) {
          hud.style.borderColor = spotTimeLeft <= 10 ? '#ef4444' : '#10B981';
          hud.style.color = spotTimeLeft <= 10 ? '#ef4444' : '#10B981';
        }
      }
    }

    function showDialog(type, itemId) {
      const overlay = document.getElementById('dialog-overlay');
      const title = document.getElementById('dialog-title');
      const desc = document.getElementById('dialog-desc');
      const img = document.getElementById('dialog-img');
      const data = productsData[itemId];

      img.src = data.img;
      img.onerror = () => { img.src = 'assets/Spot Game/SENSODYNE.png'; };

      if (type === 'correct') {
        title.innerText = "Correct Placement!";
        title.className = "dialog-title dialog-correct-title";
        desc.innerText = data.correct;
        desc.className = "dialog-desc dialog-correct-text";
      } else if (type === 'wrong') {
        title.innerText = "Oops! Wrong Position";
        title.className = "dialog-title dialog-error-title";
        desc.innerText = data.wrong;
        desc.className = "dialog-desc dialog-error-text";
      }

      overlay.classList.add('show');
    }

    function closeDialog() {
      document.getElementById('dialog-overlay').classList.remove('show');
      if (placedItemsCount === totalItems) {
        clearInterval(spotTimerInterval);
        dynamicScore = 50; // All items placed — full score!
        setTimeout(() => finishGame(), 300);
      }
    }

    function finishGame() {
      showScreen('screen-result');
      document.getElementById('result-score').textContent = dynamicScore + " pts";
      document.getElementById('result-title').textContent = dynamicScore === 50 ? 'Perfect!' : 'Time\'s Up!';
      if (dynamicScore > 0) launchConfetti(3000); 

      const actionsDiv = document.getElementById('result-actions');
      actionsDiv.innerHTML = `<button class="btn-action" onclick="processPoints()">Collect Points</button>`;
    }

    function processPoints() {
      const actionsDiv = document.getElementById('result-actions');
      actionsDiv.innerHTML = "<div style='color: white;'>Processing...</div>";

      if (uid) {
        window.location.href = `index.html?rewardGame=${GAME_ID}&rewardPts=${dynamicScore}`;
      } else {
        const payload = JSON.stringify({ type: "game_reward", gameId: GAME_ID, points: dynamicScore, nonce: Date.now() });
        const qr = qrcode(0, 'L'); qr.addData(payload); qr.make();
        actionsDiv.innerHTML = `
          <div style="background:white; padding:10px; display:inline-block; border-radius:10px; margin-bottom:10px;">
            ${qr.createImgTag(5)}
          </div>
          <p style="color:#ccc; font-size: 1.5cqi; margin-bottom: 20px;">Scan this QR with your representative to collect points.</p>
          <button class="btn-action" onclick="location.reload()" style="padding:0; background:none;">
            <img src="assets/Spot Game/startNewGameButton.png" alt="Play Again" onerror="this.outerHTML='<button class=\\'btn-action\\' onclick=\\'location.reload()\\'>Play Again</button>'">
          </button>
        `;
      }
    }

    function launchConfetti(duration) {
      const canvas = document.getElementById("confetti-canvas");
      if(!canvas) return;
      const ctx = canvas.getContext("2d"); canvas.style.display = "block";
      canvas.width = window.innerWidth; canvas.height = window.innerHeight;
      const pieces = []; const colors = ["#10B981", "#22c55e", "#ffffff", "#facc15", "#60a5fa", "#f472b6"];
      for (let i = 0; i < 100; i++) pieces.push({ x: Math.random() * canvas.width, y: -10 - Math.random() * 200, r: 4 + Math.random() * 6, color: colors[Math.floor(Math.random() * colors.length)], vx: (Math.random() - 0.5) * 4, vy: 2 + Math.random() * 4, rot: Math.random() * 360, rs: (Math.random() - 0.5) * 6 });
      const end = Date.now() + duration;
      (function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach((p) => {
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((p.rot * Math.PI) / 180); ctx.fillStyle = p.color;
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6); ctx.restore();
          p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.rot += p.rs;
        });
        if (Date.now() < end) requestAnimationFrame(frame);
        else { ctx.clearRect(0, 0, canvas.width, canvas.height); canvas.style.display = "none"; }
      })();
    }

    let draggedItem = null;
    let offsetX = 0; let offsetY = 0;
    let currentDropZone = null;

    function initDragAndDrop() {
      const items = document.querySelectorAll('.start-slot .draggable-item');
      items.forEach(item => {
        item.addEventListener('pointerdown', startDrag, { passive: false });
      });
      document.addEventListener('pointermove', drag, { passive: false });
      document.addEventListener('pointerup', endDrag);
    }

    function startDrag(e) {
      const original = e.target;
      if (original.dataset.placed === "true") return;

      original.setPointerCapture(e.pointerId);

      const rect = original.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;

      draggedItem = original.cloneNode(true);
      draggedItem.classList.add('is-dragging');
      
      draggedItem.style.width = rect.width + 'px';
      draggedItem.style.height = rect.height + 'px';
      draggedItem.style.objectFit = 'contain';
      draggedItem.originalSource = original;

      document.body.appendChild(draggedItem);
      moveItem(e.clientX, e.clientY);

      e.preventDefault();
    }

    function drag(e) {
      if (!draggedItem) return;
      e.preventDefault();
      const clientX = e.clientX;
      const clientY = e.clientY;
      moveItem(clientX, clientY);
      checkDropZones(clientX, clientY);
    }

    function moveItem(clientX, clientY) {
      if (!draggedItem) return;
      draggedItem.style.left = (clientX - offsetX) + 'px';
      draggedItem.style.top = (clientY - offsetY) + 'px';
    }

    function checkDropZones(mouseX, mouseY) {
      const dropZones = document.querySelectorAll('.drop-zone');
      let foundZone = null;

      dropZones.forEach(zone => {
        const rect = zone.getBoundingClientRect();
        if (mouseX >= rect.left && mouseX <= rect.right && mouseY >= rect.top && mouseY <= rect.bottom) {
          // Highlight ONLY if the zone is empty
          if(zone.children.length === 0) {
            zone.classList.add('highlight');
            foundZone = zone;
          }
        } else {
          zone.classList.remove('highlight');
        }
      });
      currentDropZone = foundZone;
    }

    function endDrag(e) {
      if (!draggedItem) return;

      const itemId = draggedItem.dataset.id;
      const itemGroup = draggedItem.dataset.group;

      if (currentDropZone) {
        currentDropZone.classList.remove('highlight');
        const zoneGroup = currentDropZone.dataset.group;

        // Correct Group Match
        if (itemGroup === zoneGroup && currentDropZone.children.length === 0) {
          draggedItem.classList.remove('is-dragging');
          draggedItem.style.width = ''; draggedItem.style.height = '';
          draggedItem.style.left = ''; draggedItem.style.top = '';
          
          currentDropZone.appendChild(draggedItem);
          draggedItem.originalSource.dataset.placed = "true";
          draggedItem.originalSource.classList.add('placed');
          
          placedItemsCount++;
          showDialog('correct', itemId);
        } else {
          // Dropped on a shelf, but the WRONG shelf group
          document.body.removeChild(draggedItem);
          showDialog('wrong', itemId);
        }
      } else {
        // Dropped randomly outside any drop zone (but not inside the start container area)
        const startRect = document.getElementById('items-container').getBoundingClientRect();
        if (!(e.clientX >= startRect.left && e.clientX <= startRect.right && e.clientY >= startRect.top && e.clientY <= startRect.bottom)) {
           // It was dropped on the wall / empty space
           showDialog('wrong', itemId);
        }
        document.body.removeChild(draggedItem);
      }

      draggedItem = null;
      currentDropZone = null;
    }
  </script>
</body>
</html>
