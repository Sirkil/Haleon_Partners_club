<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Centrum Rx Challenge</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

  <style>
    :root {
      --c-green: #4ade80;
      --c-red: #ef4444;
      --c-light: #38BDF8;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body { 
      background-color: #0b0614; 
      background-image: url('assets/Rx Challenge/gameBg.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      color: white; 
      overflow-x: hidden; 
      touch-action: manipulation;
    }

    .game-container { 
      width: 100%; max-width: min(100%, 100vh * 0.58); box-shadow: 0 0 40px rgba(0,0,0,0.5); 
      margin: 0 auto; 
      padding: 20px; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      position: relative;
    }
    
    .auth-title {
      font-size: 3.2rem;
      font-weight: 800;
      color: white;
      margin-bottom: 10px;
      text-align: center;
      letter-spacing: -1px;
      line-height: 1.1;
    }

    .img-btn {
      cursor: pointer;
      transition: transform 0.1s ease;
    }
    .img-btn:active {
      transform: scale(0.95);
    }

    .btn-secondary {
      background: transparent;
      color: white;
      border: 1px solid rgba(255,255,255,0.3);
      padding: 8px 16px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover {
      border-color: var(--c-light);
      color: var(--c-light);
    }

    .mode-card { 
      background: rgba(255,255,255,0.05); 
      border: 1px solid rgba(255,255,255,0.1); 
      border-radius: 24px; 
      padding: 24px; 
      margin-bottom: 20px; 
      text-align: center; 
      cursor: pointer; 
      transition: all 0.2s; 
      width: 100%;
    }
    .mode-card:hover { 
      border-color: var(--c-light); 
      background: rgba(255,255,255,0.1);
    }

    /* Game Header / HUD */
    .game-header { 
      position: absolute;
      top: 15px;
      left: 15px;
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      width: calc(100% - 30px); 
      z-index: 20;
    }
    .case-counter { 
      font-weight: 800; 
      color: var(--muted); 
      text-transform: uppercase; 
      letter-spacing: 1px; 
      font-size: 0.85rem; 
    }
    .score-display { 
      font-weight: 800; 
      color: var(--c-green); 
      font-size: 1rem; 
      background: rgba(74, 222, 128, 0.1); 
      padding: 4px 12px; 
      border-radius: 10px; 
      border: 1px solid var(--c-green); 
    }

    /* Text areas absolutely positioned over the paper */
    .patient-label {
      position: absolute; top: 13.5%; left: 0; width: 100%;
      text-align: center; color: black; font-size: clamp(1rem, 4vw, 1.2rem); font-weight: 800;
      z-index: 10;
    }

    .scenario-text { 
      position: absolute; top: 19%; left: 10%; width: 80%; height: 16%;
      display: flex; align-items: center; justify-content: center; text-align: center;
      font-size: clamp(0.85rem, 3.5vw, 1.1rem); line-height: 1.3; color: black; font-weight: 600;
      z-index: 10; padding: 0 10px;
    }
    
    /* Transparent buttons mapping precisely over the white pills in the purple box */
    .opt-btn {
      position: absolute; left: 12.5%; width: 75%; height: 7.5%;
      display: flex; align-items: center; justify-content: flex-start;
      padding-left: 5%; font-weight: 700; color: black; font-size: clamp(0.9rem, 4vw, 1.1rem);
      cursor: pointer; border-radius: 50px; background: transparent; border: none;
      transition: background 0.2s, color 0.2s; z-index: 10; overflow: hidden; white-space: nowrap;
    }
    .opt-btn:active { background: rgba(0,0,0,0.05); }
    .opt-btn:disabled { pointer-events: none; }
    
    /* Precise positions for the 4 white pills based on the caseBg.jpg layout */
    #opt-0 { top: 44.5%; } /* Moved slightly down */
    #opt-1 { top: 53.5%; } /* Moved slightly down */
    #opt-2 { top: 61.5%; }
    #opt-3 { top: 70.5%; }

    /* Explanation Dialog */
    .custom-msg-dialog {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: 0.3s;
    }
    .custom-msg-dialog.show { opacity: 1; pointer-events: all; }
    .custom-msg-box {
      background: #111827; border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; 
      padding: 30px 24px; text-align: center; width: 90%; max-width: 400px; 
      transform: scale(0.9); transition: 0.3s; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .custom-msg-dialog.show .custom-msg-box { transform: scale(1); }

    .toast {
      position: fixed; top: 30px; left: 50%; transform: translateX(-50%);
      background: white; color: black; padding: 12px 25px; border-radius: 50px;
      font-weight: 700; font-size: 1.1rem; opacity: 0; pointer-events: none;
      transition: opacity 0.3s; z-index: 10000; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <canvas id="confetti-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9998;display:none;"></canvas>
  <div class="toast" id="toast"></div>

  <div class="game-container" id="screen-start" style="text-align: center; justify-content: center; padding-top: 25%;">
    
    <img src="assets/Rx Challenge/gameLogo.png" alt="Rx Challenge Logo" style="max-width: 250px; margin: 0 auto 10px; display: block; mix-blend-mode: screen;">
    
    <div class="auth-title">Rx Challenge</div>
    
    <p style="color: #cbd5e1; margin-bottom: 40px; line-height: 1.6; font-size: 1.1rem;">
      Read the patient case and suggest the correct recommendation.<br><br>
      <strong style="color: white; font-size: 1.2rem;">Correct: +20 pts. Wrong: 0 pts.</strong>
    </p>
    
    <img src="assets/Rx Challenge/startGameButton.png" alt="Start Game" class="img-btn" style="max-width: 260px; margin: 0 auto; display: block;" onclick="proceedFromStart()">
    
    <button class="btn-secondary" id="btn-exit-start" style="margin-top: 25px; width: auto; align-self: center;" onclick="goBack()">← Back to App</button>
    
    <div style="margin-top: auto; padding-bottom: 20px;">
      <img src="assets/Rx Challenge/brought to you by centrum.png" alt="Brought to you by Centrum" style="max-width: 160px; margin: 0 auto; display: block;">
    </div>
  </div>



  <div class="game-container" id="screen-game" style="display: none; padding: 0; width: 100%; height: 100vh;">
    
    <img src="assets/Rx Challenge/caseBg.png" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: fill; z-index: 0; pointer-events: none;" alt="Case Background">

    <div class="game-header">
      <button class="btn-secondary" style="background: rgba(255,255,255,0.05);" onclick="goBack()">← Exit</button>
      <div style="display: flex; align-items: center; gap: 15px;">
        <div class="case-counter" id="case-counter">CASE 1 / 6</div>
        <div class="score-display" id="hud-score">0 pts</div>
      </div>
    </div>
 
    <div class="patient-label">Patient Case</div>
    <div class="scenario-text" id="scenario-text">Loading...</div>
    
    <button class="opt-btn" id="opt-0">A) Option</button>
    <button class="opt-btn" id="opt-1">B) Option</button>
    <button class="opt-btn" id="opt-2">C) Option</button>
    <button class="opt-btn" id="opt-3">D) Option</button>

    <div style="position: absolute; bottom: 3%; left: 0; width: 100%; text-align: center; z-index: 10;">
      <img src="assets/Rx Challenge/brought to you by centrum.png" alt="Sponsor" style="max-width: 130px; margin: 0 auto; display: block;">
    </div>
  </div>

  <div class="custom-msg-dialog" id="feedback-dialog">
    <div class="custom-msg-box">
      <div style="font-size: 4rem; margin-bottom: 10px; line-height: 1;" id="feedback-icon">✅</div>
      <div class="auth-title" style="font-size: 2rem; margin-bottom: 15px;" id="feedback-title">Correct!</div>
      <p id="feedback-text" style="color: #cbd5e1; font-size: 1.05rem; line-height: 1.5; margin-bottom: 30px;">Explanation goes here.</p>
      
      <img src="assets/Rx Challenge/nextButton.png" alt="Next" class="img-btn" style="max-width: 200px; display: block; margin: 0 auto;" onclick="nextCase()">
    </div>
  </div>

  <div class="game-container" id="screen-result" style="display: none; text-align: center; padding-top: 10vh;">
    <div style="font-size: 5rem; margin-bottom: 10px; line-height: 1;">🏆</div>
    <div class="auth-title" style="margin-bottom: 10px;">Challenge Over</div>
    <div style="font-size: 4.5rem; font-weight:900; color: var(--c-green); margin-bottom: 40px; text-shadow: 0 4px 15px rgba(74, 222, 128, 0.3);" id="result-score">0 pts</div>
    <div id="result-actions" style="width: 100%;"></div>
    
    <div style="margin-top: auto; padding-bottom: 20px;">
      <img src="assets/Rx Challenge/brought to you by centrum.png" alt="Sponsor" style="max-width: 160px; margin: 0 auto; display: block;">
    </div>
  </div>

  <script>
    // --- GAME DATA ---
    const allCases = [
      {
        scenario: "A 50-year-old male comes to the pharmacy seeking a daily multivitamin. He wants to maintain heart health, support his immunity, and keep his energy levels up.",
        options: ["Centrum Men", "Centrum Women", "Centrum Silver", "Centrum Energy"],
        correctIndex: 0,
        explanation: "Centrum Men – tailored for men’s daily health needs including heart and immune support."
      },
      {
        scenario: "A 35-year-old male wants a daily multivitamin to cover essential nutrients and support overall wellness. He is generally healthy and moderately active.",
        options: ["Centrum Men", "Centrum Women", "Centrum Silver", "Centrum Energy"],
        correctIndex: 0,
        explanation: "Centrum Men – daily multivitamin formulated for adult men."
      },
      {
        scenario: "A 28-year-old female asks for a daily multivitamin to support bone health, immunity, and overall wellness.",
        options: ["Centrum Men", "Centrum Women", "Centrum Silver", "Centrum Energy"],
        correctIndex: 1,
        explanation: "Centrum Women – formulated for women’s daily nutritional needs."
      },
      {
        scenario: "A 40-year-old female wants a daily multivitamin for long-term preventive health while managing a busy lifestyle.",
        options: ["Centrum Men", "Centrum Women", "Centrum Silver", "Centrum Energy"],
        correctIndex: 1,
        explanation: "Centrum Women – tailored for adult women’s daily health support."
      },
      {
        scenario: "A 30-year-old pharmacist reports feeling constantly fatigued despite a balanced diet and wants a supplement to boost daily energy.",
        options: ["Centrum Men", "Centrum Women", "Centrum Silver", "Centrum Energy"],
        correctIndex: 3,
        explanation: "Centrum Energy – designed specifically to support energy metabolism and reduce fatigue."
      },
      {
        scenario: "A 45-year-old office worker complains of low energy during the day and wants a daily supplement to maintain alertness and vitality.",
        options: ["Centrum Men", "Centrum Women", "Centrum Silver", "Centrum Energy"],
        correctIndex: 3,
        explanation: "Centrum Energy – helps boost energy levels for adults experiencing fatigue."
      }
    ];

    let gameCases = [];
    let currentCaseIndex = 0;
    let score = 0;

    const urlParams = new URLSearchParams(window.location.search);
    const uid = urlParams.get('uid');
    const exhausted = urlParams.get('exhausted') === 'true';
    const GAME_ID = 'prescription';


    window.onload = () => {
      if (!uid) document.getElementById('btn-exit-start').style.display = 'none';
    };

    function goBack() { 
      if (uid) window.location.href = 'index.html'; 
      else location.reload(); 
    }

    function proceedFromStart() {
      document.getElementById('screen-start').style.display = 'none';
      startGame();
    }

    function shuffleArray(array) {
      let currentIndex = array.length, randomIndex;
      while (currentIndex !== 0) {
        randomIndex = Math.floor(Math.random() * currentIndex);
        currentIndex--;
        [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
      }
      return array;
    }

    function startGame() {
      document.getElementById('screen-game').style.display = 'flex';

      gameCases = shuffleArray([...allCases]);
      currentCaseIndex = 0;
      score = 0;

      loadCase();
    }

    function loadCase() {
      document.getElementById('case-counter').textContent = `CASE ${currentCaseIndex + 1} / ${gameCases.length}`;
      document.getElementById('hud-score').textContent = `${score} pts`;

      const currentCase = gameCases[currentCaseIndex];
      document.getElementById('scenario-text').textContent = currentCase.scenario;

      for(let i=0; i<4; i++) {
        let btn = document.getElementById('opt-'+i);
        btn.disabled = false; // Re-enable
        btn.textContent = `${['A', 'B', 'C', 'D'][i]}) ${currentCase.options[i]}`;
        btn.onclick = () => checkAnswer(i, btn);
      }
    }

    function checkAnswer(selectedIndex, btn) {
      for(let i=0; i<4; i++) {
        document.getElementById('opt-'+i).disabled = true;
      }

      const currentCase = gameCases[currentCaseIndex];
      const isCorrect = (selectedIndex === currentCase.correctIndex);

      const titleEl = document.getElementById('feedback-title');
      const iconEl = document.getElementById('feedback-icon');

      if (isCorrect) {
        score += 20;
        document.getElementById('hud-score').textContent = `${score} pts`;
        
        titleEl.textContent = "Correct! +20 pts";
        titleEl.style.color = "var(--c-green)";
        iconEl.textContent = "✅";
      } else {
        titleEl.textContent = "Incorrect";
        titleEl.style.color = "var(--c-red)";
        iconEl.textContent = "❌";
      }

      document.getElementById('feedback-text').textContent = currentCase.explanation;
      setTimeout(() => document.getElementById('feedback-dialog').classList.add('show'), 500);
    }

    function nextCase() {
      document.getElementById('feedback-dialog').classList.remove('show');
      currentCaseIndex++;

      if (currentCaseIndex < gameCases.length) {
        setTimeout(loadCase, 300); 
      } else {
        setTimeout(finishGame, 300);
      }
    }

    function finishGame() {
      document.getElementById('screen-game').style.display = 'none';
      document.getElementById('screen-result').style.display = 'flex';
      document.getElementById('result-score').textContent = score + " pts";

      if (score > 0) launchConfetti(3000); 

      const actionsDiv = document.getElementById('result-actions');
      const primaryBtnHTML = `<img src="assets/Rx Challenge/collectPointButton.png" alt="Collect Points" class="img-btn" style="max-width: 320px; margin: 0 auto 15px; display: block;" onclick="processPoints()">`;

          actionsDiv.innerHTML = primaryBtnHTML;
    }

    function processPoints() {

      const actionsDiv = document.getElementById('result-actions');
      actionsDiv.innerHTML = "<p style='font-size: 1.2rem; font-weight: 600; color: white;'>Processing...</p>";

      if (uid) {
        window.location.href = `index.html?rewardGame=${GAME_ID}&rewardPts=${score}`;
      } else {
        const payload = JSON.stringify({ type: "game_reward", gameId: GAME_ID, points: score, nonce: Date.now() });
        const qr = qrcode(0, 'L');
        qr.addData(payload);
        qr.make();
        actionsDiv.innerHTML = `
          <div style="background:white; padding:15px; display:inline-block; border-radius:16px; margin-bottom:15px; box-shadow: 0 10px 20px rgba(0,0,0,0.5);">
            ${qr.createImgTag(5)}
          </div>
          <p style="color:#d1d5db; font-size:1rem; margin-bottom: 25px;">Scan this QR with your App to collect points.</p>
          <img src="assets/Rx Challenge/startNewGameButton.png" alt="Start New Game" class="img-btn" style="max-width: 250px; margin: 0 auto; display: block;" onclick="location.reload()">
        `;
      }
    }

    function showToast(msg) {
      const toast = document.getElementById("toast"); 
      toast.textContent = msg; 
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 1500);
    }

    function launchConfetti(duration) {
      const canvas = document.getElementById("confetti-canvas");
      if(!canvas) return;
      const ctx = canvas.getContext("2d");
      canvas.style.display = "block";
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      const pieces = [];
      const colors = ["#4ade80", "#38BDF8", "#FFFFFF", "#E11D48", "#facc15"]; 
      for (let i = 0; i < 150; i++) pieces.push({ x: Math.random() * canvas.width, y: -10 - Math.random() * 200, r: 6 + Math.random() * 8, color: colors[Math.floor(Math.random() * colors.length)], vx: (Math.random() - 0.5) * 5, vy: 3 + Math.random() * 5, rot: Math.random() * 360, rs: (Math.random() - 0.5) * 8 });
      const end = Date.now() + duration;
      (function frame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach((p) => {
          ctx.save(); ctx.translate(p.x, p.y); ctx.rotate((p.rot * Math.PI) / 180); ctx.fillStyle = p.color;
          ctx.fillRect(-p.r / 2, -p.r / 2, p.r, p.r * 0.6); ctx.restore();
          p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rot += p.rs;
        });
        if (Date.now() < end) requestAnimationFrame(frame);
        else { ctx.clearRect(0, 0, canvas.width, canvas.height); canvas.style.display = "none"; }
      })();
    }
  </script>
<div style="position: fixed; bottom: 5px; left: 0; width: 100%; text-align: center; color: rgba(255,255,255,0.3); font-size: 12px; pointer-events: none; z-index: 9999;">PM-EG-CNT-26-00007</div>
</body>
</html>
