<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Perfect Shelf Builder</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #000000;
      --text: #ffffff;
      --green: #10B981;
      --red: #ef4444;
      --dialog-bg: rgba(10, 10, 10, 0.95);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      user-select: none;
    }

    body {
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .screen {
      display: none;
      width: 100%;
      height: 100%;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: absolute;
      top: 0;
      left: 0;
    }

    .screen.active {
      display: flex;
    }

    /* Top Logos */
    .brand-logos {
      position: absolute;
      top: 20px;
      right: 20px;
      max-width: 200px;
      z-index: 10;
      transition: opacity 0.3s;
    }

    .brand-logos img {
      width: 100%;
      height: auto;
    }

    /* --- Start Screen --- */
    #start-screen {
      background: url('assets/Perfect Shelf/gameBg.png') no-repeat center center fixed;
      background-size: cover;
    }

    #start-screen::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6);
      z-index: -1;
    }

    #start-screen .game-logo {
      width: 250px;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    #start-screen h1 {
      font-size: 2.5rem;
      font-weight: 800;
      margin-bottom: 10px;
      text-align: center;
    }

    #start-screen p {
      font-size: 1.1rem;
      text-align: center;
      max-width: 400px;
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .btn-action {
      cursor: pointer;
      border: none;
      background: var(--green);
      color: #fff;
      padding: 15px 30px;
      border-radius: 30px;
      font-size: 1.2rem;
      font-weight: 700;
      transition: transform 0.2s, background 0.2s;
    }

    .btn-action:hover {
      transform: scale(1.05);
      background: #0d9668;
    }

    .btn-action img {
      width: 200px;
      display: block;
    }

    /* --- Game Screen --- */
    #game-screen {
      background: #000;
      overflow: hidden;
    }

    #shelf-img {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      min-width: 100%;
      min-height: 100%;
      width: auto;
      height: auto;
      object-fit: cover;
    }

    /* Overlay sits exactly on top of the rendered shelf image - sized by JS */
    #shelf-overlay {
      position: absolute;
      pointer-events: none;
    }

    .shelf-row {
      position: absolute;
      display: flex;
      justify-content: space-between;
      pointer-events: all;
    }

    .drop-zone {
      height: 100%;
      border: 2px solid transparent;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      position: relative;
    }

    .drop-zone.highlight {
      background: rgba(255, 255, 255, 0.18);
      border-color: rgba(255,255,255,0.3);
    }

    .items-container {
      position: absolute;
      display: flex;
      justify-content: center;
      gap: 1%;
      align-items: center;
      pointer-events: all;
    }

    .start-slot {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      position: relative;
      overflow: hidden;
    }

    .draggable-item {
      width: auto;
      height: 88%;
      max-width: 100%;
      max-height: 88%;
      object-fit: contain;
      cursor: grab;
      touch-action: none;
      position: static;
      z-index: 100;
      transition: opacity 0.3s;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
    }

    .draggable-item.placed {
      opacity: 0.35;
      cursor: default;
    }

    .is-dragging {
      position: fixed !important;
      z-index: 2000 !important;
      pointer-events: none;
      transform: scale(1.08);
      filter: drop-shadow(0 15px 25px rgba(0,0,0,0.5));
    }

    .drop-zone .draggable-item {
      width: auto;
      height: 82%;
      max-width: 78%;
      max-height: 82%;
      cursor: default;
    }

    /* --- Dialog Overlay --- */
    .dialog-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.8);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .dialog-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .dialog-box {
      background: var(--dialog-bg);
      border: 2px solid var(--border, #333);
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      max-width: 400px;
      width: 90%;
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .dialog-overlay.show .dialog-box {
      transform: translateY(0);
    }

    .dialog-img {
      width: 120px;
      height: auto;
      margin-bottom: 20px;
    }

    .dialog-title {
      font-size: 1.5rem;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .dialog-claim {
      font-size: 1.1rem;
      color: var(--green);
      font-weight: 600;
      margin-bottom: 20px;
      background: rgba(16, 185, 129, 0.1);
      padding: 10px;
      border-radius: 10px;
    }

    .dialog-error-title {
      color: var(--red);
    }

    #end-screen {
      background: rgba(0,0,0,0.85);
    }

    #end-screen h1 {
      font-size: 3.5rem;
      color: var(--green);
      margin-bottom: 10px;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }
  </style>
</head>
<body>

  <div class="brand-logos" id="brand-logos">
    <img src="assets/Perfect Shelf/brought to you by.png" alt="Brought to you by Panadol and Centrum" onerror="this.style.display='none';">
  </div>

  <div id="start-screen" class="screen active">
    <img src="assets/Perfect Shelf/gameLogo.png" alt="Game Logo" class="game-logo" onerror="this.style.display='none';">
    <h1>Perfect Shelf Builder</h1>
    <p>Drag the 6 products to their correct places on the pharmacy shelves.<br><strong>Total: 120 pts (20 pts per item).</strong></p>
    <button class="btn-action" onclick="startGame()" style="padding:0; background:none;">
      <img src="assets/Perfect Shelf/startGameButton.png" alt="Start Game" onerror="this.outerHTML='<button class=\'btn-action\' onclick=\'startGame()\'>Start Game</button>'">
    </button>
  </div>

  <div id="game-screen" class="screen">
    <!-- Shelf background as real <img> so JS can measure exact rendered bounds -->
    <img id="shelf-img" src="assets/Perfect Shelf/shelfBg.png" alt="" draggable="false">

    <!-- All interactive zones; JS positions this overlay exactly over the shelf image -->
    <div id="shelf-overlay">

      <div class="shelf-row" id="shelf-row-top">
        <div class="drop-zone" data-slot="1"></div>
        <div class="drop-zone" data-slot="2"></div>
        <div class="drop-zone" data-slot="3"></div>
      </div>

      <div class="shelf-row" id="shelf-row-bottom">
        <div class="drop-zone" data-slot="4"></div>
        <div class="drop-zone" data-slot="5"></div>
        <div class="drop-zone" data-slot="6"></div>
      </div>

      <div class="items-container" id="items-container">
        <div class="start-slot" id="slot-1"><img src="assets/Perfect Shelf/Centrum_energy_pack.png" class="draggable-item" data-id="1" alt="Centrum Energy"></div>
        <div class="start-slot" id="slot-2"><img src="assets/Perfect Shelf/CENTRUM_MEN.png" class="draggable-item" data-id="2" alt="Centrum Men"></div>
        <div class="start-slot" id="slot-3"><img src="assets/Perfect Shelf/CENTRUM_WOMEN.png" class="draggable-item" data-id="3" alt="Centrum Women"></div>
        <div class="start-slot" id="slot-4"><img src="assets/Perfect Shelf/Panadol advance.png" class="draggable-item" data-id="4" alt="Panadol Advance"></div>
        <div class="start-slot" id="slot-5"><img src="assets/Perfect Shelf/panadol_extra.png" class="draggable-item" data-id="5" alt="Panadol Extra"></div>
        <div class="start-slot" id="slot-6"><img src="assets/Perfect Shelf/Cold & Flu Day Pack.png" class="draggable-item" data-id="6" alt="Cold & Flu Day"></div>
      </div>

    </div>
  </div>

  <div id="end-screen" class="screen">
    <h1>Perfect!</h1>
    <p style="font-size: 1.2rem; margin-bottom: 30px;">You earned <strong>120 pts</strong>!</p>
    <button class="btn-action" onclick="location.reload()" style="padding:0; background:none;">
      <img src="assets/Perfect Shelf/startNewGameButton.png" alt="Start New Game" onerror="this.outerHTML='<button class=\'btn-action\' onclick=\'location.reload()\'>Play Again</button>'">
    </button>
  </div>

  <div class="dialog-overlay" id="dialog-overlay">
    <div class="dialog-box" id="dialog-box">
      <img src="" alt="Product" class="dialog-img" id="dialog-img" style="display:none;">
      <h2 class="dialog-title" id="dialog-title">Title</h2>
      <div class="dialog-claim" id="dialog-claim" style="display:none;">Claim text</div>
      <p id="dialog-desc">Description</p>
      <br>
      <button class="btn-action" onclick="closeDialog()">Continue</button>
    </div>
  </div>

  <script>
    const productsData = {
      "1": { name: "Centrum Energy", claim: "Supports daily energy levels", image: "assets/Perfect Shelf/Centrum_energy_pack.png" },
      "2": { name: "Centrum Men", claim: "Customized formula for Men", image: "assets/Perfect Shelf/CENTRUM_MEN.png" },
      "3": { name: "Centrum Women", claim: "Customized formula for Women", image: "assets/Perfect Shelf/CENTRUM_WOMEN.png" },
      "4": { name: "Panadol Advance", claim: "Advanced absorption for fast relief", image: "assets/Perfect Shelf/Panadol advance.png" },
      "5": { name: "Panadol Extra", claim: "Tough on strong pain", image: "assets/Perfect Shelf/panadol_extra.png" },
      "6": { name: "Cold & Flu Day", claim: "Non-drowsy relief for cold & flu", image: "assets/Perfect Shelf/Cold & Flu Day Pack.png" }
    };

    // ─── Shelf image coordinates (as % of the image's intrinsic size 1920x1080) ───
    // Measure once against the source image; JS scales to any screen size.
    const SHELF = {
      // Top shelf row (Centrum)
      topRow: {
        left:   0.295,   // left edge of first slot
        top:    0.215,   // top edge of row
        width:  0.415,   // total width spanning all 3 slots
        height: 0.26,    // height of row
        slotWidthFrac: 0.305  // each slot is ~30.5% of row width; gaps fill the rest
      },
      // Bottom shelf row (Panadol)
      bottomRow: {
        left:   0.295,
        top:    0.46,
        width:  0.415,
        height: 0.26,
        slotWidthFrac: 0.305
      },
      // Bottom tray (the 6 white boxes)
      tray: {
        left:   0.195,
        top:    0.815,
        width:  0.615,
        height: 0.175
      }
    };

    function showScreen(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById(screenId).classList.add('active');
    }

    function startGame() {
      document.getElementById('brand-logos').style.opacity = '0';
      setTimeout(() => document.getElementById('brand-logos').style.display = 'none', 300);
      showScreen('game-screen');
      // Wait for img to render then layout
      const img = document.getElementById('shelf-img');
      if (img.complete) {
        layoutShelf();
      } else {
        img.onload = layoutShelf;
      }
      window.addEventListener('resize', layoutShelf);
      initDragAndDrop();
    }

    function getImgRenderedBounds() {
      // Returns the actual rendered rect of the shelf image (cover behaviour)
      const img = document.getElementById('shelf-img');
      const vw = window.innerWidth;
      const vh = window.innerHeight;
      const iw = img.naturalWidth  || 1920;
      const ih = img.naturalHeight || 1080;
      const scale = Math.max(vw / iw, vh / ih);
      const rw = iw * scale;
      const rh = ih * scale;
      const rx = (vw - rw) / 2;
      const ry = (vh - rh) / 2;
      return { x: rx, y: ry, w: rw, h: rh };
    }

    function layoutShelf() {
      const b = getImgRenderedBounds();
      const overlay = document.getElementById('shelf-overlay');

      // Size the overlay to exactly match the rendered image
      overlay.style.left   = b.x + 'px';
      overlay.style.top    = b.y + 'px';
      overlay.style.width  = b.w + 'px';
      overlay.style.height = b.h + 'px';

      positionRow('shelf-row-top',    SHELF.topRow,    b);
      positionRow('shelf-row-bottom', SHELF.bottomRow, b);
      positionTray(b);
    }

    function positionRow(id, cfg, b) {
      const row = document.getElementById(id);
      row.style.left   = (cfg.left   * b.w) + 'px';
      row.style.top    = (cfg.top    * b.h) + 'px';
      row.style.width  = (cfg.width  * b.w) + 'px';
      row.style.height = (cfg.height * b.h) + 'px';

      const slots = row.querySelectorAll('.drop-zone');
      const slotW = cfg.slotWidthFrac * cfg.width * b.w;
      const gap   = ((1 - 3 * cfg.slotWidthFrac) / 2) * cfg.width * b.w;

      slots.forEach((slot, i) => {
        slot.style.width    = slotW + 'px';
        slot.style.position = 'absolute';
        slot.style.left     = (i * (slotW + gap)) + 'px';
        slot.style.top      = '0';
        slot.style.height   = '100%';
      });
    }

    function positionTray(b) {
      const tray = document.getElementById('items-container');
      const cfg  = SHELF.tray;
      tray.style.left   = (cfg.left   * b.w) + 'px';
      tray.style.top    = (cfg.top    * b.h) + 'px';
      tray.style.width  = (cfg.width  * b.w) + 'px';
      tray.style.height = (cfg.height * b.h) + 'px';

      const slots = tray.querySelectorAll('.start-slot');
      const slotW = (cfg.width * b.w - 5 * 0.01 * cfg.width * b.w) / 6;
      slots.forEach(slot => {
        slot.style.width = slotW + 'px';
      });
    }

    // ─── Dialog ────────────────────────────────────────────────────────────────
    function showDialog(type, itemId) {
      const overlay = document.getElementById('dialog-overlay');
      const title   = document.getElementById('dialog-title');
      const claim   = document.getElementById('dialog-claim');
      const img     = document.getElementById('dialog-img');
      const desc    = document.getElementById('dialog-desc');

      if (type === 'correct') {
        const data = productsData[itemId];
        title.innerText = "Correct Placement!";
        title.className = "dialog-title";
        title.style.color = "var(--green)";
        img.src = data.image;
        img.style.display = "inline-block";
        claim.innerText = data.claim;
        claim.style.display = "block";
        desc.innerText = "You have successfully placed " + data.name + ".";
      } else if (type === 'wrong') {
        title.innerText = "Oops! Wrong Position";
        title.className = "dialog-title dialog-error-title";
        title.style.color = "var(--red)";
        img.style.display = "none";
        claim.style.display = "none";
        desc.innerText = "This is the wrong place, try again.";
      }
      overlay.classList.add('show');
    }

    function closeDialog() {
      document.getElementById('dialog-overlay').classList.remove('show');
      if (placedItemsCount === totalItems) {
        setTimeout(() => showScreen('end-screen'), 300);
      }
    }

    // ─── Drag & Drop ───────────────────────────────────────────────────────────
    let draggedItem = null;
    let offsetX = 0, offsetY = 0;
    let currentDropZone = null;
    let placedItemsCount = 0;
    const totalItems = 6;

    function initDragAndDrop() {
      const items = document.querySelectorAll('.start-slot .draggable-item');
      items.forEach(item => {
        item.addEventListener('pointerdown', startDrag, { passive: false });
      });
      document.addEventListener('pointermove', drag, { passive: false });
      document.addEventListener('pointerup', endDrag);
    }

    function startDrag(e) {
      const original = e.target;
      if (original.dataset.placed === "true") return;

      original.setPointerCapture(e.pointerId);
      e.preventDefault();

      const rect = original.getBoundingClientRect();
      offsetX = e.clientX - rect.left;
      offsetY = e.clientY - rect.top;

      draggedItem = original.cloneNode(true);
      draggedItem.classList.add('is-dragging');
      draggedItem.style.width  = rect.width  + 'px';
      draggedItem.style.height = rect.height + 'px';
      draggedItem.style.objectFit = 'contain';
      draggedItem.originalSource = original;

      document.body.appendChild(draggedItem);
      moveItem(e.clientX, e.clientY);
    }

    function drag(e) {
      if (!draggedItem) return;
      e.preventDefault();
      moveItem(e.clientX, e.clientY);
      checkDropZones(e.clientX, e.clientY);
    }

    function moveItem(clientX, clientY) {
      if (!draggedItem) return;
      draggedItem.style.left = (clientX - offsetX) + 'px';
      draggedItem.style.top  = (clientY - offsetY) + 'px';
    }

    function checkDropZones(mouseX, mouseY) {
      const dropZones = document.querySelectorAll('.drop-zone');
      let foundZone = null;
      dropZones.forEach(zone => {
        const rect = zone.getBoundingClientRect();
        if (mouseX >= rect.left && mouseX <= rect.right &&
            mouseY >= rect.top  && mouseY <= rect.bottom) {
          if (zone.children.length === 0) {
            zone.classList.add('highlight');
            foundZone = zone;
          }
        } else {
          zone.classList.remove('highlight');
        }
      });
      currentDropZone = foundZone;
    }

    function endDrag(e) {
      if (!draggedItem) return;

      if (currentDropZone) {
        const itemId = draggedItem.dataset.id;
        const slotId = currentDropZone.dataset.slot;
        currentDropZone.classList.remove('highlight');

        if (itemId === slotId) {
          draggedItem.classList.remove('is-dragging');
          draggedItem.style.width  = '';
          draggedItem.style.height = '';
          draggedItem.style.left   = '';
          draggedItem.style.top    = '';
          currentDropZone.appendChild(draggedItem);

          draggedItem.originalSource.dataset.placed = "true";
          draggedItem.originalSource.classList.add('placed');
          placedItemsCount++;
          showDialog('correct', itemId);
        } else {
          document.body.removeChild(draggedItem);
          showDialog('wrong', null);
        }
      } else {
        document.body.removeChild(draggedItem);
      }

      draggedItem = null;
      currentDropZone = null;
    }
  </script>
</body>
</html>
